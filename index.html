<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棒球排陣與打序小工具</title>
  <!-- 載入 Tailwind CSS (響應式UI樣式庫) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Vue.js 3 (前端互動框架) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 載入 PapaParse (將 Google Sheet CSV 轉為 JSON 的解析器) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans pb-10">

  <div id="app" class="max-w-md mx-auto p-4 md:max-w-2xl">
    <!-- 頁頭標題 -->
    <header class="bg-blue-900 text-white p-4 rounded-xl shadow-md mb-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">⚾ 棒球比賽點名與先發助手</h1>
        <p class="text-xs text-blue-200">教練專用版</p>
      </div>
      <button @click="fetchRoster" class="bg-blue-700 hover:bg-blue-600 text-xs text-white px-3 py-1.5 rounded flex items-center gap-1">
        🔄 重新同步名單
      </button>
    </header>

    <!-- 載入中提示 -->
    <div v-if="loading" class="text-center py-10 text-slate-500">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
      <p>正在從 Google Sheet 載入隊員名單...</p>
    </div>

    <!-- 主內容區 -->
    <main v-else>
      <!-- 狀態欄與搜尋 -->
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4">
        <div class="flex justify-between items-center mb-3">
          <h2 class="font-bold text-lg text-slate-700">當日出席確認</h2>
          <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">
            已出席: {{ attendedPlayers.length }} / {{ players.length }} 人
          </span>
        </div>

        <!-- 搜尋與快速按鈕 -->
        <div class="flex gap-2">
          <input 
            type="text" 
            v-model="searchQuery" 
            placeholder="搜尋背號或姓名..." 
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          >
          <button @click="selectAll(true)" class="bg-slate-100 hover:bg-slate-200 text-xs px-3 py-2 rounded text-slate-600 whitespace-nowrap">全選</button>
          <button @click="selectAll(false)" class="bg-slate-100 hover:bg-slate-200 text-xs px-3 py-2 rounded text-slate-600 whitespace-nowrap">重設</button>
        </div>
      </div>

      <!-- 球員名單點名清單 (針對手機優化的網格按鈕卡片) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <div 
          v-for="player in filteredPlayers" 
          :key="player['背號']"
          @click="toggleAttendance(player)"
          :class="[
            'p-3 rounded-xl border flex items-center justify-between cursor-pointer transition-all select-none',
            player.isAttended 
              ? 'bg-blue-50 border-blue-500 shadow-sm' 
              : 'bg-white border-slate-200 opacity-70 hover:opacity-100'
          ]"
        >
          <div class="flex items-center gap-3">
            <!-- 背號球衣 icon -->
            <div :class="[
              'w-10 h-10 rounded-full flex items-center justify-center font-black text-sm border-2',
              player.isAttended ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-100 text-slate-500 border-slate-300'
            ]">
              {{ player['背號'] || '?' }}
            </div>
            
            <!-- 球員基本資訊 -->
            <div>
              <div class="font-bold text-slate-800">{{ player['球員姓名'] }}</div>
              <div class="text-xs text-slate-400 flex gap-1">
                <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600" v-if="player['守位一']">{{ player['守位一'] }}</span>
                <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600" v-if="player['守位二']">{{ player['守位二'] }}</span>
                <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600" v-if="player['守位三']">{{ player['守位三'] }}</span>
              </div>
            </div>
          </div>

          <!-- 勾選框 -->
          <div :class="[
            'w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold',
            player.isAttended ? 'bg-blue-600 text-white' : 'border border-slate-300'
          ]">
            {{ player.isAttended ? '✓' : '' }}
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        // ⚠️ 請替換為你在 Google Sheet「發布到網路」取得的 CSV 網址：
const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPF0zsn5Wm6b2BHRtaWNNJfaue03uy6LxPVmaBHXSWyVOA2jT1Nm0dVzgt2aSLgntxza9-Lg3QUPCW/pub?output=csv';
        const players = ref([]);
        const loading = ref(true);
        const searchQuery = ref('');

        // 從 Google Sheet 抓取 CSV 並解析
        const fetchRoster = () => {
          loading.value = true;
          Papa.parse(GOOGLE_SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
              // 為每個球員加入 isAttended 屬性（預設未勾選）
              players.value = results.data.map(p => ({
                ...p,
                isAttended: false
              }));
              loading.value = false;
            },
            error: (err) => {
              alert('載入失敗，請確認 Google Sheet 已發布為 CSV 並檢查網路狀態。');
              loading.value = false;
            }
          });
        };

        // 搜尋過濾
        const filteredPlayers = computed(() => {
          if (!searchQuery.value) return players.value;
          const q = searchQuery.value.toLowerCase();
          return players.value.filter(p => 
            (p['球員姓名'] && p['球員姓名'].toLowerCase().includes(q)) ||
            (p['背號'] && String(p['背號']).includes(q))
          );
        });

        // 已出席人數清單
        const attendedPlayers = computed(() => {
          return players.value.filter(p => p.isAttended);
        });

        // 切換出席狀態
        const toggleAttendance = (player) => {
          player.isAttended = !player.isAttended;
        };

        // 全選 / 重設
        const selectAll = (status) => {
          players.value.forEach(p => p.isAttended = status);
        };

        onMounted(() => {
          fetchRoster();
        });

        return {
          players,
          loading,
          searchQuery,
          filteredPlayers,
          attendedPlayers,
          toggleAttendance,
          selectAll,
          fetchRoster
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
